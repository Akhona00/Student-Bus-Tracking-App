<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Bus Tracker - Live Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <link rel="stylesheet" href="/static/css/bus_tracking.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Student Bus Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link" id="student_email"> {{ session.student_email if session.student_email else 'Not logged in' }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login" id="logout-btn">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="row">
            <!-- Bus tracking and map -->
            <div class="col-md-9">
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Live Bus Tracking</h5>
                    </div>
                    <div class="card-body p-0">
                        <div id="map"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <!-- Route Selection -->
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Route Selection</h5>
                    </div>
                    <div class="card-body">
                        <select class="form-select" id="bus-route-select">
                            <option value="">All Routes</option>
                            <option value="APK-APB">APK → APB</option>
                            <option value="APK-DFC">APK → DFC</option>
                            <option value="DFC-APB">DFC → APB</option>
                            <option value="DFC-APK">DFC → APK</option>
                            <option value="APK-SOWETO">APK → Soweto</option>
                        </select>
                        <div id="route-info" class="route-info mt-3" style="display: none;">
                            <small id="route-details"></small>
                        </div>
                    </div>
                </div>
                
                <!-- Bus Status -->
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Bus Status</h5>
                    </div>
                    <div class="card-body p-0" id="bus-status-container">
                        <div class="p-3 text-center text-muted">
                            Loading bus information...
                        </div>
                    </div>
                </div>
                
                <!-- Notifications -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Notifications</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="notification-area" id="notification-container">
                            <div class="notification-item text-center text-muted">
                                No notifications yet
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Leaflet JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    
    <!-- Your custom bus tracking script -->
    <script src="/static/js/bus_tracking.js"></script>
</body>
</html>
