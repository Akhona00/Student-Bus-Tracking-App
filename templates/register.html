<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Bus Tracker - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div class="container">
        <div class="signup-container">
            <div class="signup-header">
                <h2>Create Your Account</h2>
                <p class="text-muted">Student Bus Tracker Registration</p>
            </div>
            
            <div id="alert-container"></div>
            
            <form id="signup-form">
                <div class="row mb-3">
                    <div class="col">
                        <label for="name" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="col">
                        <label for="surname" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="surname" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="student_email" class="form-label">Student Email</label>
                    <input type="email" class="form-control" id="student_email" required>
                    <div class="form-text">Must be a valid student email address.</div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                    <div class="password-requirements">
                        Password must be at least 8 characters long and include uppercase, lowercase, and numbers.
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Create Account</button>
                
                <div class="form-text">
                    Already have an account? <a href="/login">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/register.js"></script>
</body>
</html>
