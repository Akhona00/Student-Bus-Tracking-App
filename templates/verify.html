
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Student Bus Tracker - Verify Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/static/css/verify.css">
</head>
</head>
<body>
    <div class="container">
        <div class="verify-container">
            <div class="verify-header">
                <h2>Verify Your Email</h2>
                <p class="text-muted">Enter the verification code sent to your email</p>
            </div>
            
            <div id="alert-container"></div>
            
            <form id="verify-form">
                <div class="mb-3">
                    <label for="student_email" class="form-label">Student Email</label>
                    <input type="email" class="form-control" id="student_email" required>
                </div>
                
                <div class="mb-3">
                    <label for="verification_code" class="form-label">Verification Code</label>
                    <input type="text" class="form-control verification-code" id="verification_code" maxlength="6" required>
                    <div class="form-text">
                        Enter the 6-digit code sent to your email
                    </div>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Verify Email</button>
                </div>
                
                <div class="text-center mt-3">
                    <button type="button" class="btn btn-link" id="auto-fill-btn">
                        Use verification code from registration
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/verify.js"></script>
</body>
</html>
